<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CorrectIt</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <!-- Main View -->
  <div id="main-view">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span>CorrectIt</span>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="input-section">
      <div class="textarea-wrap">
        <textarea id="input-text" placeholder="Type or paste your text here..." rows="4" maxlength="5000"></textarea>
        <div class="textarea-actions">
          <span id="char-count">0 / 5000</span>
          <div class="action-btns">
            <button id="paste-btn" class="icon-btn small" title="Paste">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
              </svg>
            </button>
            <button id="clear-btn" class="icon-btn small" title="Clear">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modes-section">
      <label class="section-label">Correction Mode</label>
      <div class="modes-grid">
        <button class="mode-btn active" data-mode="grammar">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Fix Grammar
        </button>
        <button class="mode-btn" data-mode="professional">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          Professional
        </button>
        <button class="mode-btn" data-mode="casual">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
          Casual
        </button>
        <button class="mode-btn" data-mode="concise">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="21" y1="10" x2="3" y2="10"/>
            <line x1="21" y1="6" x2="3" y2="6"/>
            <line x1="15" y1="14" x2="3" y2="14"/>
          </svg>
          Concise
        </button>
        <button class="mode-btn" data-mode="friendly">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          Friendly
        </button>
        <button class="mode-btn" data-mode="custom">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Custom
        </button>
      </div>
      <div id="custom-prompt-wrap" class="hidden">
        <input type="text" id="custom-prompt" placeholder="e.g. Make it sound like Shakespeare..." maxlength="200">
      </div>
    </div>

    <button id="correct-btn" class="primary-btn" disabled>
      <span class="btn-text">Correct Text</span>
      <span class="spinner hidden"></span>
    </button>

    <div id="result-section" class="hidden">
      <label class="section-label">Result</label>
      <div class="result-box">
        <div id="result-text"></div>
        <div class="result-actions">
          <button id="copy-btn" class="icon-btn small" title="Copy">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Copy</span>
          </button>
          <button id="replace-btn" class="icon-btn small" title="Replace original text">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            <span>Replace</span>
          </button>
        </div>
      </div>
    </div>

    <div id="error-toast" class="error-toast hidden">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span id="error-toast-text"></span>
      <button id="error-toast-close" class="icon-btn small" title="Dismiss">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="no-key-banner" class="banner hidden">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>Add your API key in <a href="#" id="banner-settings-link">Settings</a> to get started.</span>
    </div>
  </div>

  <!-- Settings View -->
  <div id="settings-view" class="hidden">
    <div class="header">
      <button id="back-btn" class="icon-btn" title="Back">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
      <span class="header-title">Settings</span>
    </div>

    <div class="settings-form">
      <div class="form-group">
        <label>AI Provider</label>
        <select id="provider-select">
          <option value="openrouter">Default (Free — No key needed)</option>
          <option value="groq">Groq (Own API key)</option>
          <!-- <option value="gemini">Google Gemini</option> -->
          <!-- <option value="openai">OpenAI</option> -->
        </select>
      </div>

      <div class="form-group hidden" id="api-key-group">
        <label id="api-key-label">API Key</label>
        <div class="key-input-wrap">
          <input type="password" id="api-key-input" placeholder="Enter your API key...">
          <button id="toggle-key" class="icon-btn small" title="Show/hide key">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="help-text" id="api-help">
          Get a free key at <a href="#" id="api-link" data-gemini="https://aistudio.google.com/app/apikey" data-openai="https://platform.openai.com/api-keys">aistudio.google.com</a>
        </span>
      </div>

      <div class="form-group">
        <label>Model</label>
        <select id="model-select">
          <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Best)</option>
          <option value="qwen/qwen3-30b-a3b:free">Qwen 3 30B (Fast)</option>
          <option value="google/gemma-3-27b-it:free">Gemma 3 27B</option>
        </select>
      </div>

      <button id="save-settings" class="primary-btn">Save Settings</button>
      <div id="save-status" class="hidden"></div>
    </div>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
